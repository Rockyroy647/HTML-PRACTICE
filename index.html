<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cricket game</title>
<style>
  body{
    text-align: center;
    background-color: rgb(66, 64, 64);
    color: white;
    margin-top: 50px;
  }
  #roy1{
    
    gap: 50px;
  }
  
</style>


</head>
<body>

<input type="number" id="roy" placeholder="123......" >
<input type="number" id="roy1" >

<br> <br> <br>
<button onclick="add()">+ add</button>
<button onclick="subtract()">- sub </button>
<button onclick="multiply()">* mult''' </button>



<h1 id="screen=">  app ka computer screen par</h1>
  <script>
function add(){
  let a =Number(document.getAnimations("roy").value);
  let b =Number(document.getAnimations("roy1").value);
  document.getElementById("screen=").innerText = " screen=" +(a+b);

}

function subtract(){
  let a = Number(document.getElementById("roy").value);
  let b = Number(document.getElementById("roy1").value);
  document.getElementById("screen=").innerText ="screen=" +(a-b);
}
function multiply(){
  let a = Number(document.getElementById("roy").value);
  let b = Number(document.getElementById("roy1").value);
  document.getElementById("screen=").innerText ="screen=" +(a*b);
}




  </script>
  
    
  
</body>
</html>
